send_command:
  target:
    entity:
      integration: pioneer_rs232
      domain: media_player
  fields:
    command:
      required: true
      example: "?P"
      selector:
        text:
    timeout:
      required: false
      default: 1.0
      selector:
        number:
          min: 0.1
          max: 5.0
          step: 0.1
          unit_of_measurement: s
